<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The evolution journal of mote — a development log tracking how a procedural micro-ecosystem evolves." />
    <meta property="og:title" content="mote — evolution journal" />
    <meta property="og:description" content="Development log for mote. Each entry documents what changed, why it changed, and what comes next." />
    <title>mote — evolution journal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='7' y='7' width='2' height='2' fill='%23dc8c50'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #09090b;
        --bg-raised: #111113;
        --border: #27272a;
        --border-subtle: #1c1c1f;
        --text-primary: #e4e4e7;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;
        --accent: #dc8c50;
        --accent-dim: rgba(220, 140, 80, 0.25);
        --mono: "IBM Plex Mono", "Menlo", monospace;
        --serif: "EB Garamond", Georgia, "Times New Roman", serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100dvh;
        overflow-x: hidden;
        font-family: var(--mono);
      }

      /* Visible scrollbar */
      body::-webkit-scrollbar { width: 6px; }
      body::-webkit-scrollbar-track { background: var(--bg); }
      body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      body::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
      body { scrollbar-width: thin; scrollbar-color: var(--border) var(--bg); }

      .journal {
        max-width: 700px;
        margin: 0 auto;
        padding: clamp(2rem, 5vh, 4rem) 1.5rem clamp(3rem, 6vh, 5rem);
      }

      .journal-header {
        margin-bottom: clamp(2rem, 5vh, 3.5rem);
        padding-bottom: clamp(1.5rem, 3vh, 2.5rem);
        border-bottom: 1px solid var(--border);
        opacity: 0;
        animation: fade-up 0.8s ease-out forwards;
      }

      .journal-header h1 {
        font-family: var(--serif);
        font-weight: 400;
        font-style: italic;
        font-size: clamp(1.6rem, 3.5vw, 2.2rem);
        letter-spacing: 0;
        text-transform: none;
        color: var(--text-primary);
        line-height: 1;
      }

      .journal-header .back {
        display: inline-block;
        font-family: var(--mono);
        font-weight: 400;
        font-size: 0.85rem;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        text-decoration: none;
        margin-bottom: 1.5rem;
        transition: color 0.2s ease;
      }

      .journal-header .back:hover {
        color: var(--accent);
      }

      .journal-header .subtitle {
        font-family: var(--mono);
        font-weight: 300;
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-top: 0.5em;
      }

      .entries {
        display: flex;
        flex-direction: column;
        gap: clamp(1.5rem, 3vh, 2.5rem);
      }

      .entry {
        border: 1px solid var(--border-subtle);
        border-radius: 6px;
        background: var(--bg-raised);
        padding: 1.25rem 1.5rem;
        opacity: 0;
        animation: fade-up 0.6s ease-out forwards;
      }

      .entry-date {
        font-family: var(--mono);
        font-weight: 400;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 0.3em;
      }

      .entry-title {
        font-family: var(--serif);
        font-weight: 500;
        font-style: italic;
        font-size: 1.35rem;
        letter-spacing: 0;
        line-height: 1.3;
        color: var(--text-primary);
        margin-bottom: 0.75em;
      }

      .entry-reflection {
        font-family: var(--serif);
        font-weight: 400;
        font-size: 1.05rem;
        line-height: 1.8;
        color: var(--text-secondary);
        margin-bottom: 1em;
      }

      .entry-change {
        font-family: var(--mono);
        font-weight: 400;
        font-size: 0.9rem;
        line-height: 1.7;
        color: var(--text-primary);
        margin-bottom: 1em;
        padding: 0.75rem 1rem;
        border-left: 3px solid var(--accent);
        background: rgba(220, 140, 80, 0.04);
        border-radius: 0 4px 4px 0;
      }

      .entry-ahead {
        list-style: none;
        padding: 0;
      }

      .entry-ahead li {
        font-family: var(--mono);
        font-weight: 300;
        font-size: 0.85rem;
        line-height: 1.65;
        color: var(--text-muted);
        padding-left: 1.25em;
        position: relative;
      }

      .entry-ahead li::before {
        content: "\2192";
        position: absolute;
        left: 0;
        color: var(--accent-dim);
      }

      .entry-files {
        font-family: var(--mono);
        font-weight: 400;
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 1em;
        padding-top: 0.75em;
        border-top: 1px solid var(--border-subtle);
        letter-spacing: 0.02em;
      }

      .empty {
        font-family: var(--mono);
        font-weight: 300;
        font-size: 0.9rem;
        color: var(--text-muted);
        text-align: center;
        padding: 4rem 0;
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 700px) {
        .journal { padding-left: 1.25rem; padding-right: 1.25rem; }
        .entry { padding: 1rem 1.25rem; }
      }
    </style>
  </head>
  <body>
    <div class="journal">
      <div class="journal-header">
        <a href="/" class="back">&larr; back to mote</a>
        <h1>evolution journal</h1>
        <p class="subtitle">development log</p>
      </div>
      <div id="entries" class="entries">
        <p class="empty">loading&hellip;</p>
      </div>
    </div>

    <script>
      fetch('/evolution-log.json')
        .then(r => r.json())
        .then(entries => {
          const container = document.getElementById('entries');
          if (!entries.length) {
            container.innerHTML = '<p class="empty">no entries yet</p>';
            return;
          }

          // Show newest first
          const reversed = [...entries].reverse();
          container.innerHTML = reversed.map((entry, i) => `
            <article class="entry" style="animation-delay: ${0.1 + i * 0.06}s">
              <div class="entry-date">${entry.date}</div>
              <h2 class="entry-title">${entry.title}</h2>
              <p class="entry-reflection">${entry.reflection}</p>
              ${entry.looking_ahead ? `
                <ul class="entry-ahead">
                  ${entry.looking_ahead.map(item => `<li>${item}</li>`).join('')}
                </ul>
              ` : ''}
              ${entry.files_changed ? `
                <p class="entry-files">${entry.files_changed.join(' \u00b7 ')}</p>
              ` : ''}
            </article>
          `).join('');
        })
        .catch(() => {
          document.getElementById('entries').innerHTML =
            '<p class="empty">could not load the evolution log</p>';
        });
    </script>
  </body>
</html>
