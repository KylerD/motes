name: Daily Evolution

on:
  workflow_dispatch:
  schedule:
    # 2x daily: 06:00, 18:00 UTC
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: mote-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Evolve
        run: |
          npx -y @anthropic-ai/claude-code -p "$(cat .claude/daily-evolve.md)" \
            --dangerously-skip-permissions \
            --max-turns 80
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Push changes
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "evolve: daily improvement $(date -u +%Y-%m-%d-%H%M)"
          fi
          git push
