name: Daily Evolution (Legacy — Manual Only)

# NOTE: Scheduled evolution is now handled by 5 specialized agents:
#   evolve-motes.yml     — Mote Agent (3x/day: 00, 08, 16 UTC)
#   evolve-sound.yml     — Sound Agent (2x/day: 01, 13 UTC)
#   evolve-terrain.yml   — Terrain & Weather Agent (2x/day: 02, 14 UTC)
#   evolve-narrative.yml — Narrative & Events Agent (2x/day: 03, 15 UTC)
#   evolve-visual.yml    — Visual Effects Agent (2x/day: 04, 20 UTC)
#
# This workflow is kept as a manual fallback for full-system evolution.

on:
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Daily evolution
        run: |
          npx -y @anthropic-ai/claude-code -p "$(cat .claude/daily-evolve.md)" \
            --dangerously-skip-permissions \
            --max-turns 50
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Push changes
        run: |
          git config user.name "claude[bot]"
          git config user.email "claude[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "evolve: daily improvement $(date -u +%Y-%m-%d)"
          fi
          git push
