name: "Evolve: Narrative & Events"

on:
  workflow_dispatch:
  schedule:
    # 2x daily: 03:00, 15:00 UTC
    - cron: '0 3 * * *'
    - cron: '0 15 * * *'

concurrency:
  group: narrative-evolution
  cancel-in-progress: false

jobs:
  evolve-narrative:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: "Narrative Agent: evolve storytelling"
        run: |
          npx -y @anthropic-ai/claude-code -p "$(cat .claude/agents/narrative-events-agent.md)" \
            --dangerously-skip-permissions \
            --max-turns 40
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Push changes
        run: |
          git config user.name "narrative-agent[bot]"
          git config user.email "narrative-agent[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "evolve(narrative): autonomous improvement $(date -u +%Y-%m-%d-%H%M)"
          fi
          git push
