name: "Evolve: Sound"

on:
  workflow_dispatch:
  schedule:
    # 2x daily: 01:00, 13:00 UTC
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'

concurrency:
  group: sound-evolution
  cancel-in-progress: false

jobs:
  evolve-sound:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: "Sound Agent: evolve audio"
        run: |
          npx -y @anthropic-ai/claude-code -p "$(cat .claude/agents/sound-agent.md)" \
            --dangerously-skip-permissions \
            --max-turns 40
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build
        run: |
          npx tsc --noEmit
          npx vite build

      - name: Push changes
        run: |
          git config user.name "sound-agent[bot]"
          git config user.email "sound-agent[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "evolve(sound): autonomous improvement $(date -u +%Y-%m-%d-%H%M)"
          fi
          git push
